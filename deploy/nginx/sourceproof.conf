# SourceProof — nginx reverse proxy (HTTP).
# Certbot will add HTTPS after: sudo certbot --nginx -d sourceproof.upthrust.club
#
# Install:
#   sudo cp deploy/nginx/sourceproof.conf /etc/nginx/sites-available/sourceproof
#   sudo ln -sf /etc/nginx/sites-available/sourceproof /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name sourceproof.upthrust.club;

    # Tarball uploads (max ~50 MB in API settings)
    client_max_body_size 55m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
